<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - NovaStack</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f0c1a 0%, #1a162a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .success-container {
            max-width: 500px;
            width: 100%;
            background: rgba(26, 22, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            padding: 2.5rem;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            animation: scaleIn 0.5s ease-out;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #10b981;
        }
        
        .order-id {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            display: inline-block;
            margin: 1rem 0;
            font-family: monospace;
            font-size: 1.1rem;
        }
        
        .payment-details {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.2rem;
            margin: 1.5rem 0;
            text-align: left;
        }
        
        .payment-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
        }
        
        .payment-row.total {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 0.5rem;
            padding-top: 0.8rem;
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .accent-text {
            color: #ff6b35;
            font-weight: 600;
        }
        
        .green-text {
            color: #10b981;
            font-weight: 600;
        }
        
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .btn-primary {
            flex: 1;
            padding: 0.8rem;
            background: linear-gradient(135deg, #ff6b35, #f7c531);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
        }
        
        .btn-secondary {
            flex: 1;
            padding: 0.8rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            border-color: #ff6b35;
            color: white;
        }
        
        .whatsapp-link {
            margin-top: 1rem;
            padding: 0.8rem;
            background: #25D366;
            border-radius: 14px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .whatsapp-link:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="success-container" id="success-container">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading order details...</p>
        </div>
    </div>

    <script>
        const CONFIG = { API: ' http://10.19.149.140:5000', WA_NUMBER: '8235263572' };
        
        // Get order ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');
        
        // Get saved order data
        const savedOrder = JSON.parse(localStorage.getItem('dc_last_order') || '{}');
        
        async function loadOrderDetails() {
            const token = localStorage.getItem('dc_token');
            
            if (!orderId) {
                showError('No order ID found');
                return;
            }
            
            try {
                let orderData = savedOrder;
                
                // Try to fetch latest order details from API
                if (token && orderId) {
                    const res = await fetch(`${CONFIG.API}/order/${orderId}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    const data = await res.json();
                    if (res.ok && data.order) {
                        orderData = {
                            order_id: data.order.id,
                            total: data.order.price,
                            advance_paid: data.order.advance_paid,
                            balance_due: data.order.price - (data.order.advance_paid || 0)
                        };
                    }
                }
                
                renderSuccess(orderData);
                
            } catch (error) {
                console.error('Error fetching order:', error);
                if (savedOrder.order_id) {
                    renderSuccess(savedOrder);
                } else {
                    showError('Could not load order details');
                }
            }
        }
        
        function renderSuccess(orderData) {
            const total = orderData.total || 0;
            const advance = orderData.advance_paid || Math.round(total * 0.15);
            const balance = total - advance;
            
            const html = `
                <div class="success-icon">
                    <i class="fas fa-check"></i>
                </div>
                
                <h1>Payment Successful! 🎉</h1>
                <p>Your order has been confirmed and is now being processed.</p>
                
                <div class="order-id">
                    <i class="fas fa-hashtag"></i> Order #${orderData.order_id || orderId}
                </div>
                
                <div class="payment-details">
                    <div class="payment-row">
                        <span>Total Amount:</span>
                        <span>₹${total}</span>
                    </div>
                    <div class="payment-row">
                        <span>Advance Paid (15%):</span>
                        <span class="green-text">₹${advance}</span>
                    </div>
                    <div class="payment-row total">
                        <span>Balance Due:</span>
                        <span class="accent-text">₹${balance}</span>
                    </div>
                </div>
                
                <div class="btn-group">
                    <a href="my-orders.html" class="btn-primary">
                        <i class="fas fa-shopping-bag"></i> View Orders
                    </a>
                    <a href="services.html" class="btn-secondary">
                        <i class="fas fa-compass"></i> Browse More
                    </a>
                </div>
                
                <a href="https://wa.me/${CONFIG.WA_NUMBER}?text=Hi! I just placed order #${orderData.order_id || orderId} on NovaStack. Looking forward to working with you! 🚀" 
                   class="whatsapp-link" target="_blank">
                    <i class="fab fa-whatsapp"></i> Chat on WhatsApp
                </a>
            `;
            
            document.getElementById('success-container').innerHTML = html;
            
            // Clear saved order data
            localStorage.removeItem('dc_last_order');
        }
        
        function showError(message) {
            document.getElementById('success-container').innerHTML = `
                <div class="success-icon" style="background: linear-gradient(135deg, #ef4444, #b91c1c);">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <h1 style="color: #ef4444;">Something Went Wrong</h1>
                <p>${message}</p>
                <div class="btn-group">
                    <a href="my-orders.html" class="btn-primary">View My Orders</a>
                    <a href="services.html" class="btn-secondary">Browse Services</a>
                </div>
            `;
        }
        
        loadOrderDetails();
    </script>
</body>
</html>
