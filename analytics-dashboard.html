<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStack - Data Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2a 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        .dashboard-header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 30px;
            background: rgba(26, 22, 42, 0.6);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .dashboard-header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff6b35, #f7c531);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .filter-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 30px;
            color: white;
            font-family: inherit;
        }
        .btn {
            background: linear-gradient(135deg, #ff6b35, #f7c531);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-outline {
            background: transparent;
            border: 1px solid #ff6b35;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(26, 22, 42, 0.8);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: #ff6b35; }
        .stat-value { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #ff6b35, #f7c531); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 10px; }
        .comparison { font-size: 0.75rem; margin-top: 5px; }
        .comparison.up { color: #10b981; }
        .comparison.down { color: #ef4444; }
        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; margin-bottom: 30px; }
        .chart-card {
            background: rgba(26, 22, 42, 0.8);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chart-card h3 { font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: #ff6b35; }
        .full-width { grid-column: span 2; }
        .data-table {
            background: rgba(26, 22, 42, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: #ff6b35; font-weight: 600; }
        .insights-section {
            background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(247,197,49,0.05));
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            border: 1px solid rgba(255,107,53,0.3);
        }
        .insight-item { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .insight-icon { width: 40px; height: 40px; background: rgba(255,107,53,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .prediction-card {
            text-align: center;
            padding: 20px;
            background: rgba(16,185,129,0.1);
            border-radius: 20px;
            border: 1px solid rgba(16,185,129,0.3);
        }
        .loading { text-align: center; padding: 50px; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #ff6b35; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 1000px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .charts-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
        @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1><i class="fas fa-chart-line"></i> NovaStack Data Analytics Dashboard</h1>
            <p>Real-time analytics from live database | Software Development Service Marketplace</p>
            
            <!-- Filter Bar -->
            <div class="filter-bar">
                <input type="date" id="startDate" class="filter-input" placeholder="Start Date">
                <input type="date" id="endDate" class="filter-input" placeholder="End Date">
                <button class="btn" onclick="filterByDate()"><i class="fas fa-filter"></i> Apply Filter</button>
                <button class="btn btn-outline" onclick="exportToPDF()"><i class="fas fa-file-pdf"></i> Export Report</button>
                <button class="btn" onclick="loadAllData()"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
            
            <div class="last-updated" id="lastUpdated">Loading data...</div>
        </div>
        
        <div id="dashboardContent"><div class="loading"><div class="spinner"></div><p>Fetching real-time data from database...</p></div></div>
    </div>

    <script>
        const API = 'https://novastack-backend.onrender.com';
        let adminToken = localStorage.getItem('nova_admin_token');
        let analyticsData = { orders: [], payments: [], users: [], services: [], refunds: [] };
        let charts = {};
        
        async function apiCall(endpoint) {
            try {
                const headers = {};
                if (adminToken) headers['Authorization'] = `Bearer ${adminToken}`;
                const response = await fetch(`${API}${endpoint}`, { headers });
                return await response.json();
            } catch (error) { return null; }
        }
        
        async function loadAllData() {
            document.getElementById('dashboardContent').innerHTML = `<div class="loading"><div class="spinner"></div><p>Fetching real-time data...</p></div>`;
            try {
                const [ordersRes, paymentsRes, usersRes, servicesRes, refundsRes] = await Promise.all([
                    apiCall('/admin/orders'), apiCall('/admin/payment-history'), apiCall('/admin/users'),
                    apiCall('/admin/services'), apiCall('/admin/refunds/history')
                ]);
                analyticsData.orders = ordersRes?.orders || [];
                analyticsData.payments = paymentsRes?.payments || [];
                analyticsData.users = usersRes?.users || [];
                analyticsData.services = servicesRes?.services || [];
                analyticsData.refunds = refundsRes?.refunds || [];
                document.getElementById('lastUpdated').innerHTML = `<i class="fas fa-clock"></i> Last updated: ${new Date().toLocaleString()}`;
                renderDashboard();
            } catch (error) { console.error('Error:', error); }
        }
        
        function filterByDate() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            if (!start && !end) { loadAllData(); return; }
            const filtered = { ...analyticsData };
            if (start) filtered.orders = analyticsData.orders.filter(o => new Date(o.created_at) >= new Date(start));
            if (end) filtered.orders = filtered.orders.filter(o => new Date(o.created_at) <= new Date(end));
            renderFilteredDashboard(filtered);
        }
        
        function renderFilteredDashboard(data) { renderDashboardWithData(data); }
        
        function exportToPDF() {
            const element = document.getElementById('dashboardContent');
            html2pdf().from(element).set({ margin: 1, filename: 'NovaStack_Analytics_Report.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).save();
        }
        
        function renderDashboard() { renderDashboardWithData(analyticsData); }
        
        function renderDashboardWithData(data) {
            const orders = data.orders, payments = data.payments, users = data.users, services = data.services, refunds = data.refunds;
            const totalOrders = orders.length, totalUsers = users.length, totalServices = services.length;
            let totalRevenue = 0;
            payments.forEach(p => { if (p.amount > 0 && p.status === 'completed') totalRevenue += p.amount; });
            
            // Calculate last month comparison
            const now = new Date();
            const thisMonth = payments.filter(p => new Date(p.created_at).getMonth() === now.getMonth() && p.amount > 0).reduce((s,p) => s + p.amount, 0);
            const lastMonth = payments.filter(p => new Date(p.created_at).getMonth() === now.getMonth() - 1 && p.amount > 0).reduce((s,p) => s + p.amount, 0);
            const growth = lastMonth ? ((thisMonth - lastMonth) / lastMonth * 100).toFixed(1) : 0;
            
            // Predict next month revenue (simple moving average)
            const last3Months = [];
            for (let i = 0; i < 3; i++) {
                const monthRevenue = payments.filter(p => new Date(p.created_at).getMonth() === now.getMonth() - i && p.amount > 0).reduce((s,p) => s + p.amount, 0);
                last3Months.push(monthRevenue);
            }
            const predictedRevenue = (last3Months.reduce((a,b)=>a+b,0) / 3) * 1.1; // 10% growth assumption
            
            const statusCount = {};
            orders.forEach(o => { statusCount[o.status] = (statusCount[o.status] || 0) + 1; });
            
            const paymentTypeCount = { advance: 0, balance: 0, refund: 0 };
            payments.forEach(p => { if (p.payment_type === 'advance') paymentTypeCount.advance += Math.abs(p.amount);
            else if (p.payment_type === 'balance') paymentTypeCount.balance += Math.abs(p.amount);
            else if (p.payment_type === 'refund') paymentTypeCount.refund += Math.abs(p.amount); });
            
            const monthlyRevenue = {};
            payments.forEach(p => { if (p.amount > 0) { const month = new Date(p.created_at).toLocaleString('default', { month: 'short' });
                monthlyRevenue[month] = (monthlyRevenue[month] || 0) + p.amount; } });
            
            const userRegistrations = {};
            users.forEach(u => { if (u.created_at) { const month = new Date(u.created_at).toLocaleString('default', { month: 'short' });
                userRegistrations[month] = (userRegistrations[month] || 0) + 1; } });
            
            const recentOrders = [...orders].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 15);
            
            const html = `
                <!-- Stats with Comparison -->
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">${totalOrders}</div><div class="stat-label">Total Orders</div></div>
                    <div class="stat-card"><div class="stat-value">${totalUsers}</div><div class="stat-label">Registered Users</div></div>
                    <div class="stat-card"><div class="stat-value">${totalServices}</div><div class="stat-label">Services Offered</div></div>
                    <div class="stat-card"><div class="stat-value">₹${totalRevenue.toFixed(2)}</div><div class="stat-label">Total Revenue</div>
                    <div class="comparison ${growth >= 0 ? 'up' : 'down'}">${growth >= 0 ? '↑' : '↓'} ${Math.abs(growth)}% from last month</div></div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">₹${thisMonth.toFixed(2)}</div><div class="stat-label">This Month Revenue</div></div>
                    <div class="stat-card"><div class="stat-value">₹${lastMonth.toFixed(2)}</div><div class="stat-label">Last Month Revenue</div></div>
                    <div class="stat-card"><div class="stat-value">${(totalOrders/totalUsers).toFixed(1)}</div><div class="stat-label">Avg Orders/User</div></div>
                    <div class="stat-card prediction-card"><div class="stat-value">₹${predictedRevenue.toFixed(2)}</div><div class="stat-label">📈 Predicted Next Month</div></div>
                </div>
                
                <div class="charts-grid">
                    <div class="chart-card"><h3><i class="fas fa-chart-pie"></i> Order Status Distribution</h3><canvas id="statusPieChart"></canvas></div>
                    <div class="chart-card"><h3><i class="fas fa-chart-pie"></i> Payment Distribution</h3><canvas id="paymentDoughnutChart"></canvas></div>
                    <div class="chart-card full-width"><h3><i class="fas fa-chart-line"></i> Monthly Revenue Trend</h3><canvas id="revenueLineChart"></canvas></div>
                    <div class="chart-card"><h3><i class="fas fa-chart-bar"></i> Popular Service Categories</h3><canvas id="categoryBarChart"></canvas></div>
                    <div class="chart-card"><h3><i class="fas fa-user-plus"></i> User Registration Trend</h3><canvas id="userRegChart"></canvas></div>
                    <div class="chart-card"><h3><i class="fas fa-money-bill-wave"></i> Refund Request Status</h3><canvas id="refundPieChart"></canvas></div>
                </div>
                
                <div class="insights-section">
                    <h3><i class="fas fa-lightbulb"></i> Key Business Insights</h3>
                    <div class="insight-item"><div class="insight-icon"><i class="fas fa-chart-line"></i></div><div class="insight-text"><div class="insight-title">Revenue Insight</div><div class="insight-desc">Total revenue ₹${totalRevenue.toFixed(2)} from ${totalOrders} orders. Average order value: ₹${(totalRevenue/totalOrders).toFixed(2)}</div></div></div>
                    <div class="insight-item"><div class="insight-icon"><i class="fas fa-percent"></i></div><div class="insight-text"><div class="insight-title">Payment Pattern</div><div class="insight-desc">Advance: ₹${paymentTypeCount.advance.toFixed(2)} (${((paymentTypeCount.advance/totalRevenue)*100).toFixed(1)}%) | Balance: ₹${paymentTypeCount.balance.toFixed(2)} (${((paymentTypeCount.balance/totalRevenue)*100).toFixed(1)}%)</div></div></div>
                    <div class="insight-item"><div class="insight-icon"><i class="fas fa-clock"></i></div><div class="insight-text"><div class="insight-title">Order Completion Rate</div><div class="insight-desc">Completed: ${statusCount['completed'] || 0} (${(((statusCount['completed']||0)/totalOrders)*100).toFixed(1)}%) | Cancelled: ${statusCount['cancelled'] || 0} (${(((statusCount['cancelled']||0)/totalOrders)*100).toFixed(1)}%)</div></div></div>
                    <div class="insight-item"><div class="insight-icon"><i class="fas fa-users"></i></div><div class="insight-text"><div class="insight-title">User Engagement</div><div class="insight-desc">${totalUsers} users generated ${totalOrders} orders. Average: ${(totalOrders/totalUsers).toFixed(1)} orders per user</div></div></div>
                    <div class="insight-item"><div class="insight-icon"><i class="fas fa-chart-line"></i></div><div class="insight-text"><div class="insight-title">Growth Trend</div><div class="insight-desc">This month revenue: ₹${thisMonth.toFixed(2)} | ${growth >= 0 ? '+' : ''}${growth}% vs last month | Predicted next month: ₹${predictedRevenue.toFixed(2)}</div></div></div>
                </div>
                
                <div class="data-table">
                    <h3><i class="fas fa-table"></i> Recent Orders</h3>
                    <table><thead><tr><th>Order ID</th><th>Customer</th><th>Service</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
                    <tbody>${recentOrders.map(o => `<tr><td>#${o.id}</td><td>${o.user_name || '—'}</td><td>${o.service_title || '—'}</td><td>₹${(o.price || 0).toFixed(2)}</td><td style="color:${o.status==='completed'?'#10b981':o.status==='cancelled'?'#ef4444':'#f59e0b'}">${o.status?.replace(/_/g,' ')}</td><td>${new Date(o.created_at).toLocaleDateString()}</td></tr>`).join('')}</tbody></table>
                </div>
            `;
            
            document.getElementById('dashboardContent').innerHTML = html;
            setTimeout(() => renderCharts({ statusCount, paymentTypeCount, monthlyRevenue, categoryCount: {}, userRegistrations, refundStatusCount: {} }), 100);
        }
        
        function renderCharts(d) {
            Object.values(charts).forEach(c => { if(c) c.destroy(); });
            const sCtx = document.getElementById('statusPieChart')?.getContext('2d');
            if(sCtx) charts.statusPie = new Chart(sCtx, { type: 'pie', data: { labels: Object.keys(d.statusCount).map(s=>s.replace(/_/g,' ')), datasets: [{ data: Object.values(d.statusCount), backgroundColor: ['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#ff6b35'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: 'white' } } } } });
            const pCtx = document.getElementById('paymentDoughnutChart')?.getContext('2d');
            if(pCtx) charts.paymentDoughnut = new Chart(pCtx, { type: 'doughnut', data: { labels: ['Advance','Balance','Refund'], datasets: [{ data: [d.paymentTypeCount.advance, d.paymentTypeCount.balance, d.paymentTypeCount.refund], backgroundColor: ['#f59e0b','#10b981','#ef4444'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: 'white' } } } } });
            const rCtx = document.getElementById('revenueLineChart')?.getContext('2d');
            if(rCtx) charts.revenueLine = new Chart(rCtx, { type: 'line', data: { labels: Object.keys(d.monthlyRevenue), datasets: [{ label: 'Revenue (₹)', data: Object.values(d.monthlyRevenue), borderColor: '#ff6b35', backgroundColor: 'rgba(255,107,53,0.1)', tension: 0.4, fill: true }] }, options: { responsive: true, plugins: { legend: { labels: { color: 'white' } } }, scales: { x: { ticks: { color: 'white' } }, y: { ticks: { color: 'white' } } } } });
            const uCtx = document.getElementById('userRegChart')?.getContext('2d');
            if(uCtx) charts.userReg = new Chart(uCtx, { type: 'bar', data: { labels: Object.keys(d.userRegistrations), datasets: [{ label: 'New Users', data: Object.values(d.userRegistrations), backgroundColor: '#8b5cf6' }] }, options: { responsive: true, plugins: { legend: { labels: { color: 'white' } } }, scales: { x: { ticks: { color: 'white' } }, y: { ticks: { color: 'white' } } } } });
        }
        
        function checkAdminLogin() {
            adminToken = localStorage.getItem('nova_admin_token');
            if (!adminToken) { document.getElementById('dashboardContent').innerHTML = `<div style="text-align:center;padding:50px;"><i class="fas fa-lock" style="font-size:3rem;"></i><h3>Admin Access Required</h3><p>Please login to view analytics dashboard</p><a href="admin.html" class="btn">Go to Admin Login</a></div>`; return false; }
            return true;
        }
        
        if(checkAdminLogin()) loadAllData();
    </script>
</body>
</html>
